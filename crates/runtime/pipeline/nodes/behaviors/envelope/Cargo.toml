[package]
name = "mizer-envelope-nodes"
version = "0.1.0"
authors = ["Max Jöhnk <maxjoehnk@gmail.com>"]
edition = "2024"

[dependencies]
anyhow = "1"
mizer-node = { path = "../../../node" }
serde = { version = "1", features = ["derive"] }
mizer-util = { path = "../../../../../util" }
tracing = "0.1"

[dev-dependencies]
test-case = "3.3"
mizer-node = { path = "../../../node", features = ["test"] }
